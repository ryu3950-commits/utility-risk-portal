<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>해외건설 국가</title>

  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
</head>

<body>
  <div class="app">
    <main class="main">
      <header class="page-header">
        <div class="brandbar">
          <img class="brand-logo" src="./assets/icak.png" alt="해외건설협회" />
        </div>
        <div class="divider"></div>
      </header>

      <section class="search-wrap">
        <div class="search-box">
          <input id="searchInput" type="text" placeholder="국가명 / ISO3로 검색 (예: UAE, ARE, Vietnam)" />
          <button id="clearBtn" class="icon-btn" title="지우기" aria-label="지우기">×</button>
          <button id="searchBtn" class="icon-btn" title="검색" aria-label="검색">🔍</button>
        </div>
      </section>

      <section class="map-wrap">
        <div id="map"></div>
      </section>

      <section class="info" id="info">
        <div class="info-title" id="infoTitle"></div>
        <div class="info-body" id="infoBody"></div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="./app.js"></script>
</body>
</html>
