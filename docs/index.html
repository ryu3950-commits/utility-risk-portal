<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>착공 전 현장 리스크 검토 플랫폼</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <main class="map-area">
      <div id="map"></div>
      <header class="topbar">
        <div>
          <p class="eyebrow">MOYOUNG CM COMPETITION PROTOTYPE</p>
          <h1>착공 전 현장 리스크 검토 플랫폼</h1>
        </div>
        <button class="primary-btn" type="button">+ 리스크 등록</button>
      </header>

      <aside class="panel">
        <div class="project-card">
          <span class="label">현재 프로젝트</span>
          <strong>창동역 일대 복합개발 가상 부지</strong>
          <p>굴착, 지하매설물, 장비동선 등 착공 전 확인이 필요한 위험요소를 지도 기반으로 검토합니다.</p>
        </div>

        <div class="metrics">
          <div>
            <span>등록 리스크</span>
            <strong>1</strong>
          </div>
          <div>
            <span>고위험</span>
            <strong class="danger">1</strong>
          </div>
          <div>
            <span>검토 상태</span>
            <strong>초안</strong>
          </div>
        </div>

        <div class="legend">
          <div><span class="swatch boundary"></span>사업부지 경계</div>
          <div><span class="swatch high"></span>위험도 상</div>
          <div><span class="swatch medium"></span>위험도 중</div>
          <div><span class="swatch low"></span>위험도 하</div>
        </div>

        <section class="detail" id="detail">
          <h2>리스크 상세</h2>
          <p class="muted">지도 위 리스크 지점을 클릭하면 원인, 영향, CM 조치방안이 표시됩니다.</p>
        </section>
      </aside>

      <div class="map-note">공개지도 기반 시연용 화면입니다. 지하매설물 등 세부 레이어는 가상 데이터로 구성합니다.</div>
    </main>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="./app.js"></script>
</body>
</html>
