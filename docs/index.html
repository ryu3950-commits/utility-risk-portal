<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>착공 전 현장 리스크 검토 플랫폼</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <aside class="panel">
      <p class="eyebrow">MOYOUNG CM COMPETITION PROTOTYPE</p>
      <h1>착공 전 현장 리스크 검토 플랫폼</h1>
      <p class="summary">
        창동역 일대 사업부지를 대상으로 굴착, 지하매설물, 장비동선 등 착공 전 확인이 필요한 위험요소를 지도 기반으로 등록하고 검토합니다.
      </p>

      <div class="status-card">
        <span class="label">현재 프로젝트</span>
        <strong>창동역 일대 복합개발 가상 부지</strong>
      </div>

      <div class="legend">
        <div><span class="swatch boundary"></span>사업부지 경계</div>
        <div><span class="swatch high"></span>위험도 상</div>
        <div><span class="swatch medium"></span>위험도 중</div>
        <div><span class="swatch low"></span>위험도 하</div>
      </div>

      <section class="detail" id="detail">
        <h2>리스크 상세</h2>
        <p class="muted">지도 위 리스크 지점을 클릭하면 원인, 영향, CM 조치방안이 표시됩니다.</p>
      </section>
    </aside>

    <main class="map-area">
      <div id="map"></div>
      <div class="map-note">공개지도 기반 시연용 화면입니다. 지하매설물 등 세부 레이어는 가상 데이터로 구성합니다.</div>
    </main>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="./app.js"></script>
</body>
</html>
